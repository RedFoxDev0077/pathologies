name: Deploy Frontend

# Builds the Vite frontend and syncs it to the VPS (nginx serves /var/www/casadiag).
# Frontend-only: does not touch the NestJS backend (that runs under PM2).

on:
  push:
    branches: [master]
    paths-ignore:
      - 'casadiag-backend/**'
      - '**.md'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: {}   # allows manual runs from the Actions tab

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false   # backend submodule not needed for the frontend build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust the VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      # nginx `root` is /var/www/casadiag/dist (see /etc/nginx/sites-available/casadiag)
      - name: Deploy dist/ to VPS
        run: |
          rsync -avz --delete \
            dist/ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/casadiag/dist/"

      - name: Fix ownership
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "chown -R www-data:www-data /var/www/casadiag"
